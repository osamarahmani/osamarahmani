name: Update profile SVGs

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "generate.mjs"
      - "convert-image.mjs"
      - "profile.json"
      - "ascii.txt"
      - "package.json"
      - ".github/workflows/update-profile.yml"

  schedule:
    # Repository creation happens outside this profile repository, so poll
    # frequently without exhausting the GitHub API request allowance.
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-svg
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate

      - name: Commit updated SVG files
        run: |
          if git diff --quiet -- profile-light.svg profile-dark.svg; then
            echo "No SVG changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-light.svg profile-dark.svg
          git commit -m "chore: update profile statistics"
          git push
